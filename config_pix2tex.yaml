pandoc:
  from: docx
  to: markdown+raw_tex+tex_math_single_backslash
  wrap: none

images:
  formula_extensions:
    - .wmf
    - .emf
  preserve_extensions:
    - .png
    - .jpg
    - .jpeg
  imagemagick_density: 900
  trim: true
  background: white

ocr:
  engines:
    - pix2tex

pix2tex:
  enabled: true
  timeout_seconds: 600

texteller:
  enabled: false
  repo_path: external/TexTeller
  timeout_seconds: 180
  command: null

ollama:
  enabled: false
  base_url: http://localhost:11434
  model: qwen3-vl:8b
  timeout_seconds: 1200
  temperature: 0
  force: false

docx2tex:
  enabled: false
  priority: 2

candidate_selection:
  priority:
    - pix2tex
  reject_patterns:
    - \[\]\s*\[\]
  max_explanation_chars: 20

latex:
  engine: xelatex
  mainfont: Times New Roman
  sansfont: Arial
  monofont: Courier New
  documentclass: article
  fontsize: 12pt
  lang: ru-RU
  build_pdf: true
  halt_on_error: false

merge:
  invalid_formula_policy: keep_image_with_todo
  inline_wrapper: \({latex}\)
  display_wrapper: |
    \[
    {latex}
    \]
